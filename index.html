<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIGO 67 PREMIUM</title>
    <style>
        @font-face { font-family: 'GTA'; src: url('https://fonts.cdnfonts.com/s/17223/pricedown.woff') format('woff'); }
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        body {
            margin: 0; padding: 0; background: #000; color: white;
            font-family: 'Orbitron', sans-serif; text-align: center;
            height: 100vh; overflow: hidden;
        }

        /* ACCUEIL PREMIUM */
        #welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(255, 0, 255, 0.3), rgba(0, 0, 0, 0.9)), url('se2022black.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; transition: 1s;
        }

        .gta-title {
            font-family: 'GTA', sans-serif; font-size: 4.5rem;
            color: #fff; text-shadow: 0 0 15px #ff00ff, 0 0 30px #00f2ff;
            margin-bottom: 40px; transform: rotate(-3deg);
        }

        .enter-btn {
            background: none; border: 4px solid #ff00ff; color: #fff;
            padding: 20px 60px; font-family: 'GTA', sans-serif; font-size: 2rem;
            cursor: pointer; box-shadow: 0 0 20px #ff00ff; transition: 0.3s;
        }

        /* PAGE STOCK */
        #main-content { display: none; height: 100%; overflow-y: auto; background: #0a0a0a; }

        .tabs {
            display: flex; justify-content: space-around; position: sticky; top: 0;
            background: rgba(0,0,0,0.95); border-bottom: 2px solid #00f2ff;
            padding: 15px 0; z-index: 50;
        }
        .tab { color: #00f2ff; text-decoration: none; font-weight: bold; font-size: 0.8rem; }

        .container { padding: 15px; }

        .item-card {
            background: rgba(20, 20, 20, 0.8); border: 1px solid #333;
            border-left: 5px solid #ff00ff; border-radius: 8px;
            margin-bottom: 20px; padding: 12px; display: flex; align-items: center;
            text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .item-img {
            width: 90px; height: 90px; border-radius: 5px;
            margin-right: 15px; object-fit: cover; border: 1px solid #444;
        }

        .item-name { font-weight: 900; font-size: 1rem; color: #00f2ff; text-transform: uppercase; }
        .price { color: #39FF14; font-size: 1.4rem; font-weight: bold; margin-top: 5px; }

        /* AUDIO CONTROLS */
        #audio-controls {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(0,0,0,0.8); border: 1px solid #00f2ff;
            border-radius: 50px; padding: 10px; display: none; align-items: center;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="gta-title">BIGO 67</div>
        <button class="enter-btn" onclick="startApp()">VOIR LE STOCK</button>
    </div>

    <div id="main-content">
        <nav class="tabs">
            <a href="#" class="tab">IPHONE</a>
            <a href="#" class="tab">SAMSUNG</a>
            <a href="#" class="tab" style="opacity: 0.3;">🕵️</a>
        </nav>

        <div class="container">
            <h2 style="font-family: 'GTA'; color: #ff00ff; font-size: 2.5rem;">ARRIVAGES</h2>

            <div class="item-card">
                <img src="12miniblue.png" class="item-img">
                <div>
                    <div class="item-name">iPhone 12 Mini Bleu</div>
                    <div style="font-size: 0.7rem; color: #888;">État Nickel - 64GB</div>
                    <div class="price">280€</div>
                </div>
            </div>

            <div class="item-card">
                <img src="12minipurple.png" class="item-img">
                <div>
                    <div class="item-name">iPhone 12 Mini Mauve</div>
                    <div style="font-size: 0.7rem; color: #888;">Compact - 128GB</div>
                    <div class="price">310€</div>
                </div>
            </div>

            <div class="item-card">
                <img src="se2020black.png" class="item-img">
                <div>
                    <div class="item-name">iPhone SE 2020 Noir</div>
                    <div style="font-size: 0.7rem; color: #888;">Classique - 64GB</div>
                    <div class="price">150€</div>
                </div>
            </div>

            <div class="item-card">
                <img src="8white.png" class="item-img">
                <div>
                    <div class="item-name">iPhone 8 Blanc</div>
                    <div style="font-size: 0.7rem; color: #888;">Parfait état</div>
                    <div class="price">120€</div>
                </div>
            </div>

            <div class="item-card">
                <img src="7black.png" class="item-img">
                <div>
                    <div class="item-name">iPhone 7 Noir</div>
                    <div style="font-size: 0.7rem; color: #888;">Petit budget</div>
                    <div class="price">90€</div>
                </div>
            </div>

        </div>
    </div>

    <audio id="myAudio" loop>
        <source src="SANDIEGO.mp3" type="audio/mpeg">
    </audio>

    <div id="audio-controls">
        <span id="vol-icon" onclick="toggleMute()" style="cursor:pointer">🔊</span>
        <input type="range" min="0" max="1" step="0.1" value="0.5" oninput="setVolume(this.value)" style="width:50px; margin-left:10px;">
    </div>

    <script>
        const audio = document.getElementById('myAudio');
        function startApp() {
            audio.play();
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                document.getElementById('audio-controls').style.display = 'flex';
            }, 1000);
        }
        function toggleMute() {
            audio.muted = !audio.muted;
            document.getElementById('vol-icon').innerText = audio.muted ? "🔇" : "🔊";
        }
        function setVolume(val) { audio.volume = val; }
    </script>
</body>
</html>
