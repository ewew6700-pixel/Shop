<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIGO 67 - PREMIUM SHOP</title>
    <style>
        @font-face { font-family: 'Pricedown'; src: url('https://fonts.cdnfonts.com/s/17223/pricedown.woff') format('woff'); }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

        :root { --pink: #ff00ff; --blue: #00f2ff; --bg: #050505; --green: #39FF14; --dark-gray: #111; --border-gray: #222; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* CHARGEMENT GTA */
        #loading-screen { position: fixed; inset: 0; background: #000; z-index: 500; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; transition: 0.8s ease-in-out; }
        .slide-bg { position: absolute; inset: 0; background-size: cover; background-position: center; animation: kenburns 10s infinite alternate; opacity: 0; transition: opacity 1.5s; }
        @keyframes kenburns { from { transform: scale(1); } to { transform: scale(1.2); } }
        .loading-bar-container { width: 80%; height: 8px; background: rgba(255, 255, 255, 0.1); border: 2px solid #fff; margin-bottom: 60px; z-index: 510; border-radius: 4px; }
        .loading-bar-fill { height: 100%; width: 0%; background: var(--pink); box-shadow: 0 0 15px var(--pink); transition: width 0.4s; border-radius: 4px; }
        #enter-wrapper { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.7); z-index: 520; backdrop-filter: blur(8px); }
        .flash-text { font-family: 'Pricedown'; font-size: 4.5rem; color: #fff; text-shadow: 0 0 20px var(--blue); animation: blink 1s infinite; margin-bottom: 30px; }
        @keyframes blink { 50% { opacity: 0.2; } }
        .enter-btn { font-family: 'Pricedown'; font-size: 2.2rem; background: none; border: 3px solid #fff; color: #fff; padding: 15px 40px; cursor: pointer; box-shadow: 0 0 20px var(--pink); border-radius: 5px; }

        /* INTERFACE */
        #app-content { display: none; min-height: 100vh; padding-bottom: 120px; }
        header { padding: 15px; text-align: center; border-bottom: 1px solid var(--border-gray); background: rgba(0, 0, 0, 0.95); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Pricedown'; font-size: 2.8rem; color: #fff; text-shadow: 0 0 10px var(--pink); margin: 0; }
        .tabs { display: flex; justify-content: center; gap: 20px; padding: 12px; background: var(--dark-gray); border-bottom: 1px solid var(--border-gray); }
        .tab { font-size: 0.75rem; color: #666; text-decoration: none; text-transform: uppercase; font-weight: 900; letter-spacing: 1.5px; padding: 8px 0; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

        /* PRODUITS */
        #home-page { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }
        .category-card { height: 140px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Pricedown'; font-size: 2.2rem; border: 1px solid var(--border-gray); background-size: cover; background-position: center; position: relative; overflow: hidden; }
        .category-card::before { content: ''; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.5); }
        .category-card span { position: relative; z-index: 1; text-shadow: 2px 2px 10px #000; }
        .container { display: none; padding: 20px; }
        .container.active { display: block; }
        .product-card { background: var(--dark-gray); border-radius: 12px; margin-bottom: 15px; padding: 12px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-gray); }
        .product-info { display: flex; align-items: center; flex: 1; }
        .product-img { width: 70px; height: 70px; border-radius: 8px; margin-right: 15px; object-fit: cover; }
        .product-name { font-weight: 900; font-size: 0.85rem; text-transform: uppercase; }
        .product-price { color: var(--green); font-weight: 900; font-size: 1.2rem; }
        .add-btn { background: var(--pink); border: none; color: white; padding: 10px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; }

        /* PANIER */
        #cart-bar { position: fixed; bottom: 25px; left: 5%; width: 90%; background: var(--blue); color: black; padding: 18px; border-radius: 50px; display: none; justify-content: space-between; align-items: center; font-weight: 900; z-index: 200; }
        #cart-modal { position: fixed; inset: 0; background: var(--bg); z-index: 600; display: none; padding: 25px; flex-direction: column; overflow-y: auto; }
        .close-cart { text-align: right; font-size: 2.5rem; color: var(--pink); }
        .cart-title { font-family: 'Pricedown'; color: var(--blue); font-size: 2.5rem; }
        .shipping-select { width: 100%; padding: 18px; background: var(--dark-gray); color: white; border: 2px solid var(--blue); border-radius: 12px; margin: 25px 0; font-weight: bold; }
        .checkout-btn { width: 100%; padding: 20px; background: var(--green); color: black; border: none; border-radius: 12px; font-weight: 900; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div id="slide1" class="slide-bg" style="background-image: url('se2022black.jpg'); opacity: 1;"></div>
    <div id="slide2" class="slide-bg" style="background-image: url('12miniblue.png');"></div>
    <div id="enter-wrapper">
        <h1 class="flash-text">BIGO 67</h1>
        <button class="enter-btn" onclick="startApp()">START GAME</button>
    </div>
    <div class="loading-bar-container" id="l-bar"><div class="loading-bar-fill" id="fill"></div></div>
</div>

<div id="app-content">
    <header><h1 class="logo" onclick="showSection('home')">BIGO 67</h1></header>
    <nav class="tabs">
        <a href="javascript:void(0)" id="t-home" class="tab active" onclick="showSection('home')">Accueil</a>
        <a href="javascript:void(0)" id="t-iphone" class="tab" onclick="showSection('iphone')">iPhones</a>
        <a href="javascript:void(0)" id="t-secret" class="tab" onclick="showSection('secret')">🕵️</a>
    </nav>

    <div id="home-page">
        <div class="category-card" style="background-image: url('12miniblue.png');" onclick="showSection('iphone')"><span>iPHONES</span></div>
        <div class="category-card" style="background-color: #1a1a1a; border: 2px solid var(--pink);" onclick="showSection('secret')"><span>INSPECTEUR 🕵️</span></div>
    </div>

    <div id="iphone" class="container">
        <div class="product-card"><div class="product-info"><img src="12miniblue.png" class="product-img"><div><div class="product-name">12 Mini Bleu</div><div class="product-price">170€</div></div></div><button class="add-btn" onclick="addToCart('iPhone 12 Mini Bleu', 170)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="12minipurple.png" class="product-img"><div><div class="product-name">12 Mini Mauve</div><div class="product-price">170€</div></div></div><button class="add-btn" onclick="addToCart('iPhone 12 Mini Mauve', 170)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="se2022black.jpg" class="product-img"><div><div class="product-name">SE 2022 Noir</div><div class="product-price">220€</div></div></div><button class="add-btn" onclick="addToCart('iPhone SE 2022 Noir', 220)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="se2020black.png" class="product-img"><div><div class="product-name">SE 2020 Noir</div><div class="product-price">160€</div></div></div><button class="add-btn" onclick="addToCart('iPhone SE 2020 Noir', 160)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="se2020red.png" class="product-img"><div><div class="product-name">SE 2020 Rouge</div><div class="product-price">160€</div></div></div><button class="add-btn" onclick="addToCart('iPhone SE 2020 Rouge', 160)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="se2020white.png" class="product-img"><div><div class="product-name">SE 2020 Blanc</div><div class="product-price">160€</div></div></div><button class="add-btn" onclick="addToCart('iPhone SE 2020 Blanc', 160)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="8white.png" class="product-img"><div><div class="product-name">8 Blanc</div><div class="product-price">85€</div></div></div><button class="add-btn" onclick="addToCart('iPhone 8 Blanc', 85)">+</button></div>
        <div class="product-card"><div class="product-info"><img src="7black.png" class="product-img"><div><div class="product-name">7 Noir</div><div class="product-price">60€</div></div></div><button class="add-btn" onclick="addToCart('iPhone 7 Noir', 60)">+</button></div>
    </div>

    <div id="secret" class="container">
        <div class="product-card"><div class="product-info"><div style="font-size: 40px; margin-right: 15px;">📍</div><div><div class="product-name">Traqueur GPS</div><div class="product-price">59€</div></div></div><button class="add-btn" onclick="addToCart('Traqueur GPS', 59)">+</button></div>
    </div>
</div>

<div id="cart-bar" onclick="openCart()"><span id="cart-count">0 ARTICLE</span><span id="cart-total-bar">0€</span></div>

<div id="cart-modal">
    <div class="close-cart" onclick="closeCart()">✕</div>
    <h2 class="cart-title">PANIER</h2>
    <div id="cart-items-list"></div>
    <select id="shipping" class="shipping-select" onchange="updateCartDisplay()">
        <option value="0">📍 Remise main propre (Obernai) - 0€</option>
        <option value="10">🚚 Livraison (Strasbourg) - 10€</option>
    </select>
    <div style="font-size: 1.8rem; font-weight: 900; margin: 20px 0;">TOTAL: <span id="cart-grand-total" style="color:var(--green)">0€</span></div>
    <button class="checkout-btn" onclick="sendOrder()">COMMANDER VIA TELEGRAM</button>
</div>

<audio id="myAudio" loop><source src="SANDIEGO.mp3" type="audio/mpeg"></audio>

<script>
    const TELEGRAM_USERNAME = 'Bigo67'; 
    let cart = [];

    function initLoadingScreen() {
        let p = 0; const fill = document.getElementById('fill');
        const interval = setInterval(() => {
            p += Math.random() * 20; if (p > 100) p = 100;
            fill.style.width = p + "%";
            if (p === 100) {
                clearInterval(interval);
                setTimeout(() => { document.getElementById('l-bar').style.display = 'none'; document.getElementById('enter-wrapper').style.display = 'flex'; }, 600);
            }
        }, 400);
    }

    function startApp() {
        document.getElementById('myAudio').play().catch(() => console.log("Musique bloquée par le navigateur"));
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block'; }, 800);
    }

    function showSection(id) {
        document.querySelectorAll('.container, #home-page').forEach(el => el.style.display = 'none');
        const target = document.getElementById(id === 'home' ? 'home-page' : id);
        target.style.display = (id === 'home' ? 'grid' : 'block');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        const tab = document.getElementById('t-' + id); if (tab) tab.classList.add('active');
    }

    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartDisplay();
    }

    function updateCartDisplay() {
        const list = document.getElementById('cart-items-list');
        const bar = document.getElementById('cart-bar');
        if (cart.length === 0) { bar.style.display = 'none'; return; }
        bar.style.display = 'flex';
        let html = ''; let sub = 0;
        cart.forEach(item => { sub += item.price; html += `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #222"><span>${item.name}</span><span>${item.price}€</span></div>`; });
        list.innerHTML = html;
        const ship = parseInt(document.getElementById('shipping').value);
        document.getElementById('cart-count').innerText = cart.length + " ARTICLES";
        document.getElementById('cart-total-bar').innerText = (sub + ship) + "€";
        document.getElementById('cart-grand-total').innerText = (sub + ship) + "€";
    }

    function openCart() { document.getElementById('cart-modal').style.display = 'flex'; }
    function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

    function sendOrder() {
        const shipCost = parseInt(document.getElementById('shipping').value);
        const sub = cart.reduce((s, i) => s + i.price, 0);
        let msg = '🛒 *COMMANDE BIGO 67*\n\n';
        cart.forEach(i => msg += `• ${i.name} - ${i.price}€\n`);
        msg += `\nLIVRAISON : ${shipCost === 0 ? 'Obernai' : 'Strasbourg (+10€)'}\n*TOTAL : ${sub + shipCost}€*`;
        window.open(`https://t.me/${TELEGRAM_USERNAME}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    document.addEventListener('DOMContentLoaded', initLoadingScreen);
</script>
</body>
</html>
